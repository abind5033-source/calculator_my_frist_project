<!DOCTYPE html>
<head>
    <title> online calculator </title>
    <link  rel="stylesheet" href="calculatorCss.css"/>
</head>

<body>
    <div class="maindiv">
        <div class="display">0</div>
        <div class="keyboard">
            <button id="buttonAc" class="operator"> AC </button>
            <button id="buttondel" class="operator"> del </button>
            <button id="buttonPersentage" onclick="" class="operator"> % </button>
            <button id="buttonslash" onclick="" class="operator"> / </button><br>
            <button id="button7" onclick="" class="number"> 7 </button>
            <button id="button8" onclick="" class="number"> 8 </button>
            <button id="button9" onclick="" class="number"> 9 </button>
            <button id="buttonx" onclick="" class="operator"> X </button><br>
            <button id="button4" onclick="" class="number"> 4 </button>
            <button id="button5" onclick="" class="number"> 5 </button>
            <button id="button6" onclick="" class="number"> 6 </button>
            <button id="buttonMines" onclick="" class="operator"> - </button><br>
            <button id="button1" onclick="" class="number"> 1 </button>
            <button id="button2" onclick="" class="number"> 2 </button>
            <button id="button3" onclick="" class="number"> 3 </button>
            <button id="buttonPlush" onclick="" class="operator"> + </button><br>
            <button id="buttonmt" onclick="" class="operator"> mt </button>
            <button id="button0" onclick="" class="number"> 0 </button>
            <button id="buttonpoint" onclick="" class="number"> . </button>
            <button id="buttonequle" onclick="" class="equle_to"> = </button>
        </div>
    </div>
<script src="jCalculator.js"></script>

</body>

</html>
